<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drag the Words</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#0E1D2E;
color:#F4F4F4;
padding:40px;
font-size:24px;
}

h2{
margin-bottom:30px;
}

/* WORD BANK */

.wordbank{
margin-bottom:60px;
}

.word{
display:inline-block;
background:#ff6400;
padding:14px 30px;
border-radius:10px;
margin:10px;
cursor:grab;
font-weight:bold;
user-select:none;
}

/* SENTENCES */

.sentence{
margin:35px 0;
line-height:1.8;
}

/* DROP AREA */

.dropzone{
display:inline-flex;
align-items:center;
justify-content:center;

min-width:240px;
height:60px;

border-bottom:6px solid #ff3b3b;

margin:0 10px;

font-weight:bold;
font-size:22px;
}

.correct{
border-bottom:6px solid #00e676;
color:#00e676;
}

</style>
</head>

<body>

<h2>Drag the correct word into each sentence</h2>

<div class="wordbank" id="wordbank"></div>

<div id="sentences"></div>

<script>

/* DATA */

let words = [
"annoy",
"grow",
"grew up",
"challenges",
"fate"
]

let sentences = [

{
text:"Loud music at night can ___ the neighbors.",
answer:"annoy"
},

{
text:"Plants ___ faster when they get enough sunlight.",
answer:"grow"
},

{
text:"She ___ in a small town.",
answer:"grew up"
},

{
text:"Learning a new language has many ___, but it is rewarding.",
answer:"challenges"
},

{
text:"Some people believe ___ decides who we meet in life.",
answer:"fate"
}

]

/* SHUFFLE FUNCTION */

function shuffle(array){

for(let i=array.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1))

[array[i],array[j]]=[array[j],array[i]]

}

}

/* RANDOMIZE */

shuffle(words)
shuffle(sentences)

/* CREATE WORD BANK */

const bank=document.getElementById("wordbank")

words.forEach(word=>{

const div=document.createElement("div")

div.className="word"
div.draggable=true

div.dataset.word=word

div.innerText=word

bank.appendChild(div)

})

/* CREATE SENTENCES */

const container=document.getElementById("sentences")

sentences.forEach(s=>{

const div=document.createElement("div")

div.className="sentence"

const parts=s.text.split("___")

div.innerHTML=`

${parts[0]}

<span class="dropzone" data-answer="${s.answer}"></span>

${parts[1]}

`

container.appendChild(div)

})

/* DRAG SYSTEM */

const wordsDrag=document.querySelectorAll(".word")
const zones=document.querySelectorAll(".dropzone")

wordsDrag.forEach(word=>{

word.addEventListener("dragstart",e=>{

e.dataTransfer.setData("text",word.dataset.word)

})

})

zones.forEach(zone=>{

zone.addEventListener("dragover",e=>{

e.preventDefault()

})

zone.addEventListener("drop",e=>{

e.preventDefault()

const word=e.dataTransfer.getData("text")

if(word===zone.dataset.answer){

zone.textContent=word
zone.classList.add("correct")

document.querySelectorAll(".word").forEach(w=>{
if(w.dataset.word===word){
w.style.display="none"
}
})

}

})

})

</script>

</body>
</html>
