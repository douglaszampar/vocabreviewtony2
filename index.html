<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Drag the Words</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#0E1D2E;
color:#F4F4F4;
padding:40px;
font-size:24px;
}

/* WORD BANK */

.wordbank{
margin-bottom:50px;
}

.word{
display:inline-block;
background:#ff6400;
padding:14px 30px;
border-radius:10px;
margin:10px;
cursor:grab;
font-weight:bold;
}

/* SENTENCES */

.sentence{
margin:30px 0;
line-height:1.8;
}

/* DROP AREA (same style as previous activity) */

.dropzone{
display:inline-flex;
align-items:center;
justify-content:center;
min-width:220px;
height:50px;
border-bottom:5px solid #ff3b3b;
margin:0 8px;
font-weight:bold;
font-size:22px;
}

.correct{
border-bottom:5px solid #00e676;
color:#00e676;
}

</style>
</head>
<body>

<h2>Drag the correct word into each sentence</h2>

<div class="wordbank" id="wordbank"></div>

<div id="sentences"></div>

<script>

/* DATA */

let words = [
"annoy",
"grow",
"grew up",
"challenges",
"fate"
]

let sentences = [
{
text:"Loud music at night can ___ the neighbors.",
answer:"annoy"
},
{
text:"Plants ___ faster when they get enough sunlight.",
answer:"grow"
},
{
text:"She ___ in a small town.",
answer:"grewup"
},
{
text:"Learning a new language has many ___, but it is rewarding.",
answer:"challenges"
},
{
text:"Some people believe ___ decides who we meet in life.",
answer:"fate"
}
]

/* SHUFFLE FUNCTION */

function shuffle(array){
for(let i=array.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1))
[array[i],array[j]]=[array[j],array[i]]
}
}

/* RANDOMIZE */

shuffle(words)
shuffle(sentences)

/* CREATE WORD BANK */

const bank=document.getElementById("wordbank")

words.forEach(word=>{

const div=document.createElement("div")

div.className="word"
div.draggable=true
div.id=word.replace(" ","")

div.innerText=word

bank.appendChild(div)

})

/* CREATE SENTENCES */

const container=document.getElementById("sentences")

sentences.forEach(s=>{

const div=document.createElement("div")

div.className="sentence"

const parts=s.text.split("___")

div.innerHTML=`
${parts[0]}
<span class="dropzone" data-answer="${s.answer}"></span>
${parts[1]}
`

container.appendChild(div)

})

/* DRAG SYSTEM */

const draggableWords=document.querySelectorAll(".word")
const zones=document.querySelectorAll(".dropzone")

draggableWords.forEach(word=>{

word.addEventListener("dragstart",e=>{
e.dataTransfer.setData("text",word.id)
})

})

zones.forEach(zone=>{

zone.addEventListener("dragover",e=>{
e.preventDefault()
})

zone.addEventListener("drop",e=>{

e.preventDefault()

const id=e.dataTransfer.getData("text")

if(id===zone.dataset.answer){

const word=document.getElementById(id)

zone.textContent=word.textContent
zone.classList.add("correct")

word.style.display="none"

}

})

})

</script>

</body>
</html>
