<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drag the Words</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#0E1D2E;
color:white;
padding:40px;
font-size:22px;
}

h2{
margin-bottom:30px;
}

.wordbank{
margin-bottom:50px;
}

.word{
display:inline-block;
background:#ff6400;
padding:12px 25px;
margin:8px;
border-radius:8px;
cursor:grab;
font-weight:bold;
}

.dropzone{
display:inline-block;
min-width:200px;
border-bottom:4px solid red;
margin:0 10px;
}

.correct{
border-bottom:4px solid #00e676;
color:#00e676;
}

.sentence{
margin:25px 0;
}

</style>

</head>

<body>

<h2>Drag the correct word into the sentence</h2>

<div class="wordbank">

<div class="word" draggable="true">grew up</div>
<div class="word" draggable="true">fate</div>
<div class="word" draggable="true">annoy</div>
<div class="word" draggable="true">challenges</div>
<div class="word" draggable="true">grow</div>

</div>

<div class="sentence">
Loud music at night can 
<span class="dropzone" data-answer="annoy"></span>
the neighbors.
</div>

<div class="sentence">
Plants 
<span class="dropzone" data-answer="grow"></span>
faster when they get sunlight.
</div>

<div class="sentence">
She 
<span class="dropzone" data-answer="grew up"></span>
in a small town.
</div>

<div class="sentence">
Learning English has many 
<span class="dropzone" data-answer="challenges"></span>.
</div>

<div class="sentence">
Some people believe 
<span class="dropzone" data-answer="fate"></span>
decides our future.
</div>

<script>

let draggedWord = null

document.querySelectorAll(".word").forEach(word => {

word.addEventListener("dragstart", function(){
draggedWord = this
})

})

document.querySelectorAll(".dropzone").forEach(zone => {

zone.addEventListener("dragover", function(e){
e.preventDefault()
})

zone.addEventListener("drop", function(){

if(draggedWord.innerText === this.dataset.answer){

this.innerText = draggedWord.innerText
this.classList.add("correct")
draggedWord.style.display = "none"

}

})

})

</script>

</body>
</html>
